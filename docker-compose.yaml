# ================================================================
# Betpreneur Backend Docker Compose
# ================================================================
# Services: PostgreSQL, Redis (for caching/sessions), Backend
# ================================================================

services:
  # ------------------------------
  # PostgreSQL Database
  # ------------------------------
  db:
    image: postgres:16-alpine
    container_name: betpreneur_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-postgres}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5050}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - betpreneur_network
    profiles:
      - database

  # ------------------------------
  # Redis (Optional - for caching/sessions)
  # ------------------------------
  redis:
    image: redis:7-alpine
    container_name: betpreneur_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - betpreneur_network
    profiles:
      - cache

  # ------------------------------
  # Backend Application
  # ------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: betpreneur_backend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      # Django
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_SETTINGS_MODULE: config.settings

      # Database
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-postgres}
      DB_USER: ${DB_USER:-postgres}
      DB_HOST: db
      DB_PORT: 5432
      # DB_PASSWORD set via.docker/env below

      # External APIs (set in .env)
      FD_TOKEN: ${FD_TOKEN:-}
      APS_KEY: ${APS_KEY:-}
      ODDS_KEY: ${ODDS_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}

      # Google Drive
      KEY_FILE: ${KEY_FILE:-}
      SHEET_NAME: ${SHEET_NAME:-GrindAlgo Tracker}
      DRIVE_FOLDER: ${DRIVE_FOLDER:-GrindAlgo Reports}

      # Frontend
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}

      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}

      # Timezone
      TZ: ${TZ:-Africa/Lagos}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      # redis:
      #   condition: service_healthy
    volumes:
      - ./staticfiles:/home/appuser/staticfiles
      - ./media:/home/appuser/media
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - betpreneur_network

  # ------------------------------
  # Nginx (Reverse Proxy)
  # ------------------------------
  # nginx:
  #   image: nginx:alpine
  #   container_name: betpreneur_nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - backend
  #   networks:
  #     - betpreneur_network
  #   profiles:
  #     - nginx

  # ------------------------------
  # Adminer (Database GUI - dev only)
  # ------------------------------
  adminer:
    image: adminer:4.8.1
    container_name: betpreneur_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - betpreneur_network
    profiles:
      - dev
      - tools


# ------------------------------
# Networks
# ------------------------------
networks:
  betpreneur_network:
    driver: bridge


# ------------------------------
# Volumes
# ------------------------------
volumes:
  postgres_data:
    name: betnehmer_postgres_data
  redis_data:
    name: betpreneur_redis_data
  staticfiles:
    name: betpreneur_staticfiles
  media:
    name: betpreneur_media


# ------------------------------
# Notes
# ------------------------------
# Usage:
#   docker compose up -d              # Start all services
#   docker compose up -d db           # Start only database
#   docker compose up -d db backend   # Start database + backend
#
# Development:
#   docker compose --profile dev up -d
#
# With nginx:
#   docker compose --profile nginx up -d
#
# View logs:
#   docker compose logs -f backend
#
# Run management commands:
#   docker compose exec backend python manage.py migrate
#   docker compose exec backend python manage.py createsuperuser