# ================================================================
# Betpreneur Backend Docker Compose
# ================================================================
# Services: PostgreSQL, Backend, Celery Worker, Celery Beat
# ================================================================

services:
  # ------------------------------
  # PostgreSQL Database
  # ------------------------------
  db:
    image: postgres:16-alpine
    container_name: betpreneur_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-postgres}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - betpreneur_network

  # ------------------------------
  # Backend Application
  # ------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: betpreneur_backend
    restart: unless-stopped
    ports:
      - "${BACKEND_HOST_PORT:-18000}:8000"
    expose:
      - "8000"
    environment:
      # Django
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-backend.betpreneur.ng,localhost,127.0.0.1}
      DJANGO_SETTINGS_MODULE: config.settings
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}

      # Database
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-postgres}
      DB_USER: ${DB_USER:-postgres}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      # DB_PASSWORD set via.docker/env below

      # External APIs (set in .env)
      APS_KEY: ${APS_KEY:-}
      APS_MAX_FIXTURES: ${APS_MAX_FIXTURES:-90}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_NAME: ${RESEND_FROM_NAME:-Betpreneur}
      RESEND_FROM_EMAIL_PREFIX: ${RESEND_FROM_EMAIL_PREFIX:-support}
      RESEND_FROM_EMAIL_DOMAIN: ${RESEND_FROM_EMAIL_DOMAIN:-betpreneur.ng}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-support@betpreneur.ng}

      # Google Drive
      KEY_FILE: ${KEY_FILE:-}
      SHEET_NAME: ${SHEET_NAME:-GrindAlgo Tracker}
      DRIVE_FOLDER: ${DRIVE_FOLDER:-GrindAlgo Reports}

      # Frontend
      FRONTEND_URL: ${FRONTEND_URL:-https://tanstack-start-app.betpreneur.workers.dev,https://betpreneur.ng,https://www.betpreneur.ng,https://betpreneur.lovable.app,https://betprenuer.lovable.app,http://localhost:3000}

      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://tanstack-start-app.betpreneur.workers.dev,https://betpreneur.ng,https://www.betpreneur.ng,https://betpreneur.lovable.app,https://betprenuer.lovable.app,http://localhost:3000}

      # Timezone
      TZ: ${TZ:-Africa/Lagos}

      # Celery
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:?Set CELERY_BROKER_URL to your Coolify Redis URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:?Set CELERY_RESULT_BACKEND to your Coolify Redis URL}
      ALGO_GENERATE_HOUR: ${ALGO_GENERATE_HOUR:-0}
      ALGO_GENERATE_MINUTE: ${ALGO_GENERATE_MINUTE:-5}
      ALGO_SETTLE_HOUR: ${ALGO_SETTLE_HOUR:-6}
      ALGO_SETTLE_MINUTE: ${ALGO_SETTLE_MINUTE:-30}
      ALGO_AUDITOR_DAY: ${ALGO_AUDITOR_DAY:-1}
      ALGO_AUDITOR_HOUR: ${ALGO_AUDITOR_HOUR:-8}
      ALGO_AUDITOR_MINUTE: ${ALGO_AUDITOR_MINUTE:-0}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./media:/home/appuser/media
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - betpreneur_network

  # ------------------------------
  # Celery Worker
  # ------------------------------
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: betpreneur_celery_worker
    restart: unless-stopped
    command: celery -A config worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-2}
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-backend.betpreneur.ng,localhost,127.0.0.1}
      DJANGO_SETTINGS_MODULE: config.settings
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-postgres}
      DB_USER: ${DB_USER:-postgres}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      APS_KEY: ${APS_KEY:-}
      APS_MAX_FIXTURES: ${APS_MAX_FIXTURES:-90}
      KEY_FILE: ${KEY_FILE:-}
      SHEET_NAME: ${SHEET_NAME:-GrindAlgo Tracker}
      DRIVE_FOLDER: ${DRIVE_FOLDER:-GrindAlgo Reports}
      EMAIL_RECIPIENT: ${EMAIL_RECIPIENT:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:?Set CELERY_BROKER_URL to your Coolify Redis URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:?Set CELERY_RESULT_BACKEND to your Coolify Redis URL}
      TZ: ${TZ:-Africa/Lagos}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./media:/home/appuser/media
    networks:
      - betpreneur_network

  # ------------------------------
  # Celery Beat Scheduler
  # ------------------------------
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: betpreneur_celery_beat
    restart: unless-stopped
    command: celery -A config beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-backend.betpreneur.ng,localhost,127.0.0.1}
      DJANGO_SETTINGS_MODULE: config.settings
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-postgres}
      DB_USER: ${DB_USER:-postgres}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      APS_KEY: ${APS_KEY:-}
      APS_MAX_FIXTURES: ${APS_MAX_FIXTURES:-90}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:?Set CELERY_BROKER_URL to your Coolify Redis URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:?Set CELERY_RESULT_BACKEND to your Coolify Redis URL}
      ALGO_GENERATE_HOUR: ${ALGO_GENERATE_HOUR:-0}
      ALGO_GENERATE_MINUTE: ${ALGO_GENERATE_MINUTE:-5}
      ALGO_SETTLE_HOUR: ${ALGO_SETTLE_HOUR:-6}
      ALGO_SETTLE_MINUTE: ${ALGO_SETTLE_MINUTE:-30}
      ALGO_AUDITOR_DAY: ${ALGO_AUDITOR_DAY:-1}
      ALGO_AUDITOR_HOUR: ${ALGO_AUDITOR_HOUR:-8}
      ALGO_AUDITOR_MINUTE: ${ALGO_AUDITOR_MINUTE:-0}
      TZ: ${TZ:-Africa/Lagos}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - betpreneur_network

  # ------------------------------
  # Nginx (Reverse Proxy)
  # ------------------------------
  # nginx:
  #   image: nginx:alpine
  #   container_name: betpreneur_nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - backend
  #   networks:
  #     - betpreneur_network
  #   profiles:
  #     - nginx

  # ------------------------------
  # Adminer (Database GUI - dev only)
  # ------------------------------
  adminer:
    image: adminer:4.8.1
    container_name: betpreneur_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - betpreneur_network
    profiles:
      - dev
      - tools


# ------------------------------
# Networks
# ------------------------------
networks:
  betpreneur_network:
    driver: bridge


# ------------------------------
# Volumes
# ------------------------------
volumes:
  postgres_data:
    name: betnehmer_postgres_data
  media:
    name: betpreneur_media


# ------------------------------
# Notes
# ------------------------------
# Usage:
#   docker compose up -d              # Start all services
#   docker compose up -d db           # Start only database
#   docker compose up -d db backend   # Start database + backend
#
# Development:
#   docker compose --profile dev up -d
#
# With nginx:
#   docker compose --profile nginx up -d
#
# View logs:
#   docker compose logs -f backend
#
# Run management commands:
#   docker compose exec backend python manage.py migrate
#   docker compose exec backend python manage.py createsuperuser
